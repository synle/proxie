name: Release Official

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.2). Leave empty to use version from package.json.'
        required: false
        default: ''
      draft:
        description: 'Create as draft release'
        type: boolean
        default: false
      release_notes:
        description: 'Custom release notes (optional). Prepended before the changelog.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.pre.outputs.tag }}
      sha: ${{ steps.pre.outputs.sha }}
    steps:
      - uses: actions/checkout@v6

      # Guard: never let the release pipeline create a draft release
      # with a bogus tag. We resolve the candidate tag in the same
      # order `begin-release` does (explicit input → tag-ref push →
      # version_file) and require it to match strict semver. If the
      # check fails we abort BEFORE begin-release creates the draft
      # so no cleanup is needed.
      #
      # Background — why this guard exists (2026-05-10):
      # The earlier `version: ${{ inputs.tag || github.ref_name }}`
      # fallback resolved to "main" on a workflow_dispatch from the
      # default branch (no `tag` input), and the shared resolve-tag
      # action then produced `vmain` as the release tag. The
      # `vmain` release rolled three back-to-back v7.0.x dispatches
      # into a single overwritten artifact on `display-dj`. The
      # guard + the safer `version:` expression below together make
      # this class of bug impossible to ship again.
      - name: Validate resolved tag (fail fast)
        run: |
          set -euo pipefail
          INPUT_TAG="${{ inputs.tag }}"
          if [ -n "$INPUT_TAG" ]; then
            CANDIDATE="${INPUT_TAG#v}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            CANDIDATE="${GITHUB_REF#refs/tags/v}"
          else
            CANDIDATE=$(node -e "process.stdout.write(JSON.parse(require('fs').readFileSync('src-tauri/tauri.conf.json','utf-8')).version)")
          fi
          if [[ ! "$CANDIDATE" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+][A-Za-z0-9.]+)?$ ]]; then
            {
              echo "::error::Resolved release tag candidate 'v${CANDIDATE}' is not strict semver."
              echo "::error::Source priority: inputs.tag → refs/tags/v* → src-tauri/tauri.conf.json#version."
              echo "::error::Fix one of those before re-running the workflow."
              echo "::error::This guard exists because a 'vmain' release was produced on 2026-05-10 by an unguarded fallback to github.ref_name."
            } >&2
            exit 1
          fi
          echo "Tag candidate is valid: v${CANDIDATE}"

      - uses: synle/workflows/actions/release/begin-release@main
        id: pre
        with:
          mode: official
          project_name: Proxie
          version: ${{ inputs.tag || (startsWith(github.ref, 'refs/tags/') && github.ref_name) || '' }}
          version_file: src-tauri/tauri.conf.json

  build:
    needs: [prepare]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: --target x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libssl-dev

      - name: Install dependencies
        run: npm ci || npm install --no-fund --prefer-offline

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_RELEASE: 'true'
        with:
          tagName: ${{ needs.prepare.outputs.tag }}
          releaseName: 'Proxie ${{ needs.prepare.outputs.tag }}'
          releaseBody: 'Build in progress...'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  release:
    needs: [prepare, build]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: synle/workflows/actions/release/end-release@main
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          project_name: Proxie
          mode: official
          build_result: ${{ needs.build.result }}
          sha: ${{ needs.prepare.outputs.sha }}
          user_notes: ${{ inputs.release_notes }}
          extra_body_path: .github/release-body-static.md
